<script>
let db={producao:[],vendas:[],despesas:[],cooperados:[],frequencia:[],ocorrenciasSaude:[],metasVista:{},materiais:[],categorias:["Papel","Plástico","Metal","Vidro","Eletrônico","Outros","Rejeito"]};
const categoriasPadrao=["Papel","Plástico","Metal","Vidro","Eletrônico","Outros","Rejeito"];
const materiaisPadrao=['PAPELÃO I|Papel|kg|Bruto','PAPELÃO II|Papel|kg|Bruto','PAPEL BRANCO|Papel|kg|Bruto','PAPEL MISTO|Papel|kg|Bruto','PAPEL JORNAL|Papel|kg|Bruto','TETRAPAK|Papel|kg|Bruto','PAPEL REVISTAS|Papel|kg|Bruto','PAPEL KRAFT|Papel|kg|Bruto','PET|Plástico|kg|Bruto','PET VERDE|Plástico|kg|Bruto','PET AZUL|Plástico|kg|Bruto','PET COLORIDO|Plástico|kg|Bruto','PET AZEITE|Plástico|kg|Bruto','PEAD BRANCO|Plástico|kg|Bruto','PEAD TRANSPARENTE|Plástico|kg|Bruto','PEAD COLORIDO|Plástico|kg|Bruto','PEAD BALDE E BACIA BRANCO|Plástico|kg|Bruto','PEAD BALDE E BACIA COLORIDO|Plástico|kg|Bruto','PEAD SACOLINHA|Plástico|kg|Bruto','PEAD SORO|Plástico|kg|Bruto','PP TRANSPARENTE / MINERAL|Plástico|kg|Bruto','PP MARGARINA|Plástico|kg|Bruto','PP TAMPAS|Plástico|kg|Bruto','PP ESTALADOR|Plástico|kg|Bruto','PP CADEIRAS|Plástico|kg|Bruto','PP CAIXARIA|Plástico|kg|Bruto','PP COPO|Plástico|kg|Bruto','PEBD FILME TRANSPARENTE|Plástico|kg|Bruto','PEBD FILME COLORIDO|Plástico|kg|Bruto','PS|Plástico|kg|Bruto','PS ISOPOR|Plástico|kg|Bruto','PVC|Plástico|kg|Bruto','SUCATA FERROSA|Metal|kg|Bruto','ALUMINIO LATA (LATINHA)|Metal|kg|Bruto','ALUMINIO PERFIL|Metal|kg|Bruto','ALUMINIO PERFIL COLORIDO|Metal|kg|Bruto','ALUMINIO PANELA|Metal|kg|Bruto','ALUMINIO DURO|Metal|kg|Bruto','ALUMINIO BANDEJA|Metal|kg|Bruto','PERSIANA|Metal|kg|Bruto','CHAPARIA SUJA (SPRAY)|Metal|kg|Bruto','CHAPARIA LIMPA|Metal|kg|Bruto','MOTORZINHO|Metal|kg|Bruto','RAIO X|Metal|kg|Bruto','PLACA TV|Metal|kg|Bruto','PLACA HD|Metal|kg|Bruto','COBRE|Metal|kg|Bruto','COBRE III|Metal|kg|Bruto','BRONZE|Metal|kg|Bruto','ANTIMÔNIO|Metal|kg|Bruto','INOX|Metal|kg|Bruto','INOX FERROSO|Metal|kg|Bruto','METAL|Eletrônico|kg|Bruto','CHUMBO BATERIA|Eletrônico|kg|Bruto','RADIADOR|Eletrônico|kg|Bruto','CACO|Vidro|kg|Bruto','GARRAFA INTEIRA 1|Vidro|kg|Bruto','GARRAFA INTEIRA 2|Vidro|kg|Bruto','VIDRO 1|Vidro|kg|Bruto','VIDRO 2|Vidro|kg|Bruto','ROLON|Vidro|kg|Bruto','TONER|Eletrônico|un|Bruto','CARTUCHO|Eletrônico|un|Bruto','OUTROS 1|Outros|kg|Bruto','Aglutinado Colorido PEBD|Plástico|kg|Processado','Aglutinado Transparente PEBD|Plástico|kg|Processado','Moído Colorido PEAD Garrafa|Plástico|kg|Processado','Moído Branco PEAD Garrafa|Plástico|kg|Processado','Moído PEAD Transp.|Plástico|kg|Processado','Moído PP Branco|Plástico|kg|Processado','Moído PE Duro|Plástico|kg|Processado','Moído Balde e Bacia|Plástico|kg|Processado','PP moído caixaria/cadeira|Plástico|kg|Processado','PP aglutinado|Plástico|kg|Processado','PP moído tampas|Plástico|kg|Processado','PP moído mineral|Plástico|kg|Processado','PP moído margarina|Plástico|kg|Processado','PP moído Transp.|Plástico|kg|Processado','Aglutinado Sacolinha|Plástico|kg|Processado','PS aglutinado|Plástico|kg|Processado','Moído PS Duro|Plástico|kg|Processado','Moído PS Cristal|Plástico|kg|Processado','Verde PEAD extrusado|Plástico|kg|Processado','Transp. PEAD extrusado|Plástico|kg|Processado','Branco PEAD extrusado|Plástico|kg|Processado','Preto PP balde e bacia extrusado|Plástico|kg|Processado','Cinza PP margarina extrusado|Plástico|kg|Processado','Transp. PP extrusado|Plástico|kg|Processado','Canela PEBD extrusado|Plástico|kg|Processado','REJEITO|Rejeito|kg|Rejeito'];
let currentView="dashboard",editProducaoId=null,editVendaId=null,editDespesaId=null,editCoopId=null,editMaterialNome=null,editOcorrenciaId=null;
let appReady=false,backupEmAndamento=false;
function salvarDB(){
    localStorage.setItem("recControlDB",JSON.stringify(db));
    if(appReady&&!backupEmAndamento){registrarAlteracaoComBackup();}
}
function carregarDB(){const data=localStorage.getItem("recControlDB"); if(data){try{db=JSON.parse(data)}catch(e){alert("Erro ao carregar banco local")}} if(!db.producao)db.producao=[]; if(!db.vendas)db.vendas=[]; if(!db.despesas)db.despesas=[]; if(!db.cooperados)db.cooperados=[]; if(!db.frequencia)db.frequencia=[]; if(!db.ocorrenciasSaude)db.ocorrenciasSaude=[]; if(!db.metasVista)db.metasVista={}; if(!db.categorias)db.categorias=[]; db.categorias=[...new Set([...categoriasPadrao,...db.categorias])]; if(!db.materiais)db.materiais=[]; sincronizarMateriaisPadrao(); salvarDB();}
function sincronizarMateriaisPadrao(){const mapaPadrao=new Map(); materiaisPadrao.forEach(m=>{let[nome,categoria,unidade,tipoPadrao]=m.split("|"); mapaPadrao.set(nome,{nome,categoria,unidade,tipoPadrao});}); db.materiais=db.materiais.map(mat=>{let padrao=mapaPadrao.get(mat.nome); return padrao?{...mat,categoria:padrao.categoria,unidade:padrao.unidade,tipoPadrao:padrao.tipoPadrao}:mat;}); mapaPadrao.forEach((padrao,nome)=>{if(!db.materiais.some(m=>m.nome===nome))db.materiais.push(padrao);}); db.producao.forEach(p=>{let padrao=mapaPadrao.get(p.material); if(padrao){p.categoria=padrao.categoria; p.unidade=padrao.unidade; p.tipo=padrao.tipoPadrao; p.tipoPadrao=padrao.tipoPadrao;}});}
function moeda(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v)||0)} function num(v,d=2){let n=Number(v)||0; if(Number.isInteger(n))return String(n).replace('.',','); return n.toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:d})} function formatarDataBR(data){if(!data)return '';let d=String(data);if(/^\d{2}\/\d{2}\/\d{4}$/.test(d))return d;if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return d;let [a,m,di]=d.split('-');return `${di}/${m}/${a}`} function normalizarDataISO(data){if(!data)return '';let d=String(data).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d;if(/^\d{2}\/\d{2}\/\d{4}$/.test(d)){let [di,m,a]=d.split('/');return `${a}-${m}-${di}`}return d} function hojeISO(){return new Date().toISOString().slice(0,10)} function anoAtual(){return new Date().getFullYear()} function mesAtual(){return new Date().getMonth()+1} function mesNome(m){return new Date(2026,m-1,1).toLocaleString('pt-BR',{month:'long'})} function getDate(v){return v?new Date(v+"T00:00:00"):null} function mesmoMesAno(data,mes,ano){let d=getDate(data);return d&&(!mes||d.getMonth()+1===Number(mes))&&(!ano||d.getFullYear()===Number(ano))} function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}

function nomeArquivoBackup(){let agora=new Date();let pad=n=>String(n).padStart(2,'0');return `backup_sistema_residuos_${agora.getFullYear()}-${pad(agora.getMonth()+1)}-${pad(agora.getDate())}_${pad(agora.getHours())}-${pad(agora.getMinutes())}-${pad(agora.getSeconds())}.json`;}
function baixarBackup(modo='manual'){
    backupEmAndamento=true;
    let pacote={sistema:'Sistema de Gestão Integrada de Resíduos Sólidos',versao:'V26.1',geradoEm:new Date().toISOString(),modoBackup:modo,dados:db};
    let blob=new Blob([JSON.stringify(pacote,null,2)],{type:'application/json'});
    let url=URL.createObjectURL(blob);
    let a=document.createElement('a');
    a.href=url;
    a.download=nomeArquivoBackup();
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    localStorage.setItem('recControlUltimoBackup',new Date().toISOString());
    localStorage.setItem('recControlBackupPendente','nao');
    localStorage.setItem('recControlAlteracoesDesdeBackup','0');
    backupEmAndamento=false;
    atualizarBackupStatusTopo();
}
function registrarAlteracaoComBackup(){
    let qtd=Number(localStorage.getItem('recControlAlteracoesDesdeBackup')||0)+1;
    localStorage.setItem('recControlAlteracoesDesdeBackup',String(qtd));
    localStorage.setItem('recControlBackupPendente','sim');
    atualizarBackupStatusTopo();
}
function atualizarBackupStatusTopo(){

function calcularEstoque(){let map=new Map(); db.producao.forEach(p=>{if(p.tipo==='Rejeito')return; let e=map.get(p.material)||{produzido:0,vendido:0}; e.produzido+=Number(p.quantidade)||0; map.set(p.material,e)}); db.vendas.forEach(v=>{let e=map.get(v.material)||{produzido:0,vendido:0}; e.vendido+=Number(v.quantidade)||0; map.set(v.material,e)}); return [...map.entries()].map(([material,e])=>({material,produzido:e.produzido,vendido:e.vendido,saldo:e.produzido-e.vendido})).sort((a,b)=>a.material.localeCompare(b.material));}
function resumoProducao(lista){let total=lista.filter(p=>p.tipo!=='Rejeito').reduce((a,p)=>a+(Number(p.quantidade)||0),0); let rejeito=lista.filter(p=>p.tipo==='Rejeito').reduce((a,p)=>a+(Number(p.quantidade)||0),0); let processado=lista.filter(p=>p.tipo==='Processado').reduce((a,p)=>a+(Number(p.quantidade)||0),0); let bruto=lista.filter(p=>p.tipo==='Bruto').reduce((a,p)=>a+(Number(p.quantidade)||0),0); let eficiencia=(total+rejeito)>0?total/(total+rejeito)*100:0; let porCategoria={},porMaterial={}; lista.forEach(p=>{if(p.tipo==='Rejeito')return; porCategoria[p.categoria]=(porCategoria[p.categoria]||0)+(Number(p.quantidade)||0); porMaterial[p.material]=(porMaterial[p.material]||0)+(Number(p.quantidade)||0)}); let topCat=Object.entries(porCategoria).sort((a,b)=>b[1]-a[1])[0]; let topMat=Object.entries(porMaterial).sort((a,b)=>b[1]-a[1])[0]; return {total,rejeito,processado,bruto,eficiencia,porCategoria,porMaterial,topCat,topMat};}

function gerarAlertasDashboard(ctx){
    let mes=ctx.mes, ano=ctx.ano, rp=ctx.rp, vencidas=ctx.vencidas;
    let itens=[], nivel='good';
    function add(tipo,msg){itens.push({tipo,msg}); if(tipo==='danger')nivel='danger'; else if(tipo==='warning'&&nivel!=='danger')nivel='warning';}
    if(vencidas.length>0)add('danger',`Existem ${vencidas.length} despesa(s) vencida(s).`);
    let metaRejeito=typeof metaValor==='function'?Number(metaValor('rejeito')||0):0;
    if(metaRejeito>0 && rp.rejeito>metaRejeito)add('danger',`Rejeito acima da meta definida (${num(rp.rejeito)} kg de ${num(metaRejeito)} kg).`);
    else if(!metaRejeito && (rp.total+rp.rejeito)>0 && (rp.rejeito/(rp.total+rp.rejeito)*100)>15)add('warning',`Rejeito acima de 15% do volume processado no período.`);
    let freq=typeof freqMedia==='function'?freqMedia(mes,ano):0;
    if(freq>0 && freq<85)add('warning',`Frequência média abaixo de 85% (${num(freq,1)}%).`);
    let abertas=(db.ocorrenciasSaude||[]).filter(o=>String(o.status||'')!=='Encerrada').length;
    if(abertas>0)add('danger',`Existem ${abertas} ocorrência(s) de saúde/segurança em aberto.`);
    let limite=new Date(); limite.setDate(limite.getDate()-90);
    let estoqueParado=calcularEstoque().filter(e=>e.saldo>0).filter(e=>{
        let vendasMaterial=(db.vendas||[]).filter(v=>v.material===e.material&&v.data).sort((a,b)=>String(b.data).localeCompare(String(a.data)));
        if(!vendasMaterial.length)return true;
        let ultima=getDate(vendasMaterial[0].data);
        return ultima && ultima<limite;
    }).length;
    if(estoqueParado>0)add('warning',`Existem ${estoqueParado} material(is) com estoque disponível sem venda recente.`);
    if(!itens.length){itens.push({tipo:'good',msg:'Nenhum alerta crítico identificado.'});}
    let cor=nivel==='danger'?'#b91c1c':nivel==='warning'?'#d4af37':'#008037';
    let html=`<div class="bar-list">${itens.map(i=>{let icon=i.tipo==='danger'?'🔴':i.tipo==='warning'?'🟡':'🟢';return `<div style="padding:.55rem .7rem;border-radius:14px;background:#f8fbfd;border:1px solid #e1e7ee;font-weight:700;color:#263238">${icon} ${escapeHtml(i.msg)}</div>`}).join('')}</div>`;
    return {cor,html};
}
function listaResumo(obj,tipo='kg',lim=99){let arr=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,lim); if(!arr.length)return '<div class="empty">Sem dados no período.</div>'; return `<ul>${arr.map(([k,v])=>`<li><strong>${escapeHtml(k)}:</strong> ${tipo==='R$'?moeda(v):num(v)+' kg'}</li>`).join('')}</ul>`}
function graficoBarras(obj,tipo='kg',lim=5){let arr=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,lim); if(!arr.length)return '<div class="empty">Sem dados para gráfico.</div>'; let max=Math.max(...arr.map(x=>Number(x[1])||0),1); return `<div class="bar-list">${arr.map(([k,v])=>`<div class="bar-item"><div><strong>${escapeHtml(k)}</strong></div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,(Number(v)||0)/max*100)}%"></div></div><div>${tipo==='R$'?moeda(v):num(v)+' kg'}</div></div>`).join('')}</div>`}
function mapaProducaoPorMaterial(lista){let obj={}; lista.forEach(p=>{if(p.tipo==='Rejeito')return; obj[p.material]=(obj[p.material]||0)+(Number(p.quantidade)||0)}); return obj}
function mapaProducaoMensal(lista){let obj={}; for(let i=1;i<=12;i++){obj[mesNome(i).slice(0,3)]=0} lista.forEach(p=>{if(p.tipo==='Rejeito')return; let d=getDate(p.data); if(!d)return; let chave=mesNome(d.getMonth()+1).slice(0,3); obj[chave]=(obj[chave]||0)+(Number(p.quantidade)||0)}); return obj}
function mapaVendasValor(lista){let obj={}; lista.forEach(v=>obj[v.material]=(obj[v.material]||0)+(Number(v.total)||0)); return obj}
function mapaVendasVolume(lista){let obj={}; lista.forEach(v=>obj[v.material]=(obj[v.material]||0)+(Number(v.quantidade)||0)); return obj}

function renderVendas(){let html=`<div class="card-panel"><h2>${editVendaId?'✏️ Editar Venda':'💰 Registrar Venda'}</h2><div class="notice"><strong>Venda simplificada:</strong> escolha o material vendido. A categoria aparece automaticamente e o tipo pode ser ajustado no lançamento.</div><div class="form-grid"><div class="field"><label for="vendaData">Data da venda</label><input type="date" id="vendaData"></div><div class="field"><label for="vendaMaterial">Material vendido</label><select id="vendaMaterial">${optMateriais('',false)}</select></div><div class="field"><label for="vendaCategoria">Categoria automática</label><input type="text" id="vendaCategoria" readonly></div><div class="field"><label for="vendaTipo">Tipo do material</label><select id="vendaTipo"><option>Bruto</option><option>Processado</option><option>Rejeito</option></select></div><div class="field"><label for="vendaUnidade">Unidade</label><input type="text" id="vendaUnidade" readonly></div><div class="field"><label for="vendaQuantidade">Quantidade vendida</label><input type="number" id="vendaQuantidade" placeholder="Informe a quantidade"></div><div class="field"><label for="vendaPrecoUnit">Preço unitário</label><input type="number" id="vendaPrecoUnit" placeholder="R$ por kg"></div><div class="field"><label for="vendaComprador">Comprador</label><input type="text" id="vendaComprador" placeholder="Nome do comprador"></div><div class="field"><label for="vendaObs">Observações</label><textarea id="vendaObs" placeholder="Informações complementares"></textarea></div></div><div class="btn-row"><button id="salvarVenda">${editVendaId?'Atualizar Venda':'Salvar Venda'}</button><button id="cancelarVenda" class="secondary" style="display:${editVendaId?'inline-block':'none'}">Cancelar</button></div></div><div class="card-panel"><h3>Vendas Realizadas</h3><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="fVendaMes">${optMes('',true)}</select></div><div class="filter-field"><label>Ano</label><select id="fVendaAno">${optAno()}</select></div><div class="filter-field"><label>Material</label><select id="fVendaMaterial">${optMateriais()}</select></div><button id="btnVendaFiltro" class="info">Filtrar</button></div><div id="listaVendas"></div></div>`; dynamicView().innerHTML=html; salvarVenda.onclick=salvarVendaFn; cancelarVenda.onclick=()=>{editVendaId=null;renderVendas()}; btnVendaFiltro.onclick=listarVendas; vendaMaterial.onchange=preencherInfoVenda; preencherInfoVenda(); if(editVendaId)popularFormVenda(editVendaId); listarVendas();}
function preencherInfoVenda(){let mat=db.materiais.find(m=>m.nome===document.getElementById('vendaMaterial').value); if(!mat)return; if(document.getElementById('vendaCategoria'))document.getElementById('vendaCategoria').value=mat.categoria||''; if(document.getElementById('vendaUnidade'))document.getElementById('vendaUnidade').value=mat.unidade||'kg'; if(document.getElementById('vendaTipo'))document.getElementById('vendaTipo').value=mat.tipoPadrao||'Bruto';}
function dynamicView(){return document.getElementById('dynamic-view')}
function salvarVendaFn(){let data=vendaData.value,material=vendaMaterial.value,qtd=Number(vendaQuantidade.value),precoUnit=Number(vendaPrecoUnit.value); if(!data||!material||!qtd||!precoUnit)return alert('Preencha data, material, quantidade e preço.'); let matCad=db.materiais.find(m=>m.nome===material)||{}; let categoria=vendaCategoria?.value||matCad.categoria||''; let unidade=vendaUnidade?.value||matCad.unidade||'kg'; let tipo=vendaTipo?.value||matCad.tipoPadrao||'Bruto'; let estoqueAtual=calcularEstoque().find(e=>e.material===material)?.saldo||0; let qtdOriginal=0; if(editVendaId){qtdOriginal=db.vendas.find(v=>v.id===editVendaId&&v.material===material)?.quantidade||0} if(qtd>estoqueAtual+qtdOriginal)return alert(`Estoque insuficiente. Disponível: ${num(estoqueAtual+qtdOriginal)} kg`); let item={id:editVendaId||Date.now(),data,material,categoria,unidade,tipo,quantidade:qtd,precoUnit,total:qtd*precoUnit,comprador:vendaComprador.value,observacoes:vendaObs.value}; if(editVendaId){let i=db.vendas.findIndex(v=>v.id===editVendaId); if(i>=0)db.vendas[i]=item; editVendaId=null}else db.vendas.push(item); salvarDB(); renderVendas();}
function popularFormVenda(id){let v=db.vendas.find(x=>x.id===id); if(!v)return; vendaData.value=v.data; vendaMaterial.value=v.material; preencherInfoVenda(); if(v.categoria&&document.getElementById('vendaCategoria'))vendaCategoria.value=v.categoria; if(v.unidade&&document.getElementById('vendaUnidade'))vendaUnidade.value=v.unidade; if(v.tipo&&document.getElementById('vendaTipo'))vendaTipo.value=v.tipo; vendaQuantidade.value=v.quantidade; vendaPrecoUnit.value=v.precoUnit; vendaComprador.value=v.comprador||''; vendaObs.value=v.observacoes||'';}
function listarVendas(){let mes=fVendaMes.value,ano=fVendaAno.value,mat=fVendaMaterial.value; let lista=db.vendas.filter(v=>mesmoMesAno(v.data,mes,ano)&&(!mat||v.material===mat)); listaVendas.innerHTML=`<div class="notice"><strong>Total vendido:</strong> ${num(lista.reduce((a,v)=>a+Number(v.quantidade||0),0))} kg &nbsp; | &nbsp; <strong>Faturamento:</strong> ${moeda(lista.reduce((a,v)=>a+Number(v.total||0),0))} &nbsp; | &nbsp; <strong>Preço médio:</strong> ${moeda((lista.reduce((a,v)=>a+Number(v.total||0),0))/(lista.reduce((a,v)=>a+Number(v.quantidade||0),0)||1))}/kg</div><div class="table-wrap"><table><tr><th>Data</th><th>Material</th><th>Categoria</th><th>Tipo</th><th>Qtd</th><th>Preço</th><th>Total</th><th>Comprador</th><th>Ações</th></tr>${lista.map(v=>{let matCad=db.materiais.find(m=>m.nome===v.material)||{};return `<tr><td>${formatarDataBR(v.data)}</td><td>${escapeHtml(v.material)}</td><td>${escapeHtml(v.categoria||matCad.categoria||'')}</td><td>${escapeHtml(v.tipo||matCad.tipoPadrao||'Bruto')}</td><td>${num(v.quantidade)} ${escapeHtml(v.unidade||matCad.unidade||'kg')}</td><td>${moeda(v.precoUnit)}</td><td>${moeda(v.total)}</td><td>${escapeHtml(v.comprador||'')}</td><td><button class="mini-btn info" onclick="editarVenda(${v.id})">✏️ Editar</button> <button class="mini-btn danger" onclick="excluirVenda(${v.id})">🗑️ Excluir</button></td></tr>`}).join('')||'<tr><td colspan="9">Sem vendas.</td></tr>'}</table></div>`;}

function renderDespesas(){let html=`<div class="card-panel"><h2>${editDespesaId?'✏️ Editar Despesa':'📉 Nova Despesa'}</h2><div class="notice"><strong>Status automático:</strong> se tiver data de pagamento, a despesa será considerada <strong>Pago</strong>. Se não tiver pagamento e o vencimento já passou, será <strong>Vencido</strong>. Caso contrário, será <strong>A Vencer</strong>.</div><div class="form-grid"><div class="field"><label for="despVenc">Data de vencimento</label><input type="date" id="despVenc"></div><div class="field"><label for="despPag">Data de pagamento</label><input type="date" id="despPag"></div><div class="field"><label for="despTipo">Descrição / tipo da despesa</label><input type="text" id="despTipo" placeholder="Ex.: Energia, aluguel, contador"></div><div class="field"><label for="despFornecedor">Fornecedor / credor</label><input type="text" id="despFornecedor" placeholder="Quem vai receber"></div><div class="field"><label for="despCategoria">Categoria da despesa</label><select id="despCategoria"><option>Administrativo</option><option>Operacional</option><option>Pessoal</option><option>Impostos e Taxas</option><option>Manutenção</option><option>Outros</option></select></div><div class="field"><label for="despValor">Valor da despesa</label><input type="number" id="despValor" placeholder="R$"></div><div class="field"><label for="despPagamento">Forma de pagamento</label><select id="despPagamento"><option>PIX</option><option>Dinheiro</option><option>Débito</option><option>Crédito</option><option>Boleto</option><option>Transferência</option></select></div><div class="field"><label for="despDoc">Documento</label><input type="text" id="despDoc" placeholder="NF / recibo / contrato"></div><div class="field"><label for="despObs">Observações</label><textarea id="despObs" placeholder="Informações complementares"></textarea></div></div><div class="btn-row"><button id="salvarDespesa">${editDespesaId?'Atualizar Despesa':'Salvar Despesa'}</button><button id="cancelarDesp" class="secondary" style="display:${editDespesaId?'inline-block':'none'}">Cancelar</button></div></div><div class="card-panel"><h3>Controle de Despesas</h3><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="fDespMes">${optMes('',true)}</select></div><div class="filter-field"><label>Ano</label><select id="fDespAno">${optAno()}</select></div><div class="filter-field"><label>Status</label><select id="fDespStatus"><option value="">Todas</option><option>Pago</option><option>A Vencer</option><option>Vencido</option></select></div><div class="filter-field"><label>Categoria</label><select id="fDespCategoria"><option value="">Todas categorias</option><option>Administrativo</option><option>Operacional</option><option>Pessoal</option><option>Impostos e Taxas</option><option>Manutenção</option><option>Outros</option></select></div><button id="btnDespFiltro" class="info">Filtrar</button></div><div id="listaDespesas"></div></div>`; dynamicView().innerHTML=html; salvarDespesa.onclick=salvarDespesaFn; cancelarDesp.onclick=()=>{editDespesaId=null;renderDespesas()}; btnDespFiltro.onclick=listarDespesas; if(editDespesaId)popularFormDespesa(editDespesaId); listarDespesas();}
function salvarDespesaFn(){let item={id:editDespesaId||Date.now(),dataVencimento:despVenc.value,dataPagamento:despPag.value,tipo:despTipo.value,categoriaDesp:despCategoria.value,valor:Number(despValor.value),pagamento:despPagamento.value,fornecedor:despFornecedor.value,documento:despDoc.value,obs:despObs.value}; if(!item.dataVencimento||!item.tipo||!item.valor)return alert('Preencha vencimento, descrição e valor.'); item.situacao=item.dataPagamento?'Pago':'Pendente'; item.data=item.dataPagamento||item.dataVencimento; if(editDespesaId){let i=db.despesas.findIndex(d=>d.id===editDespesaId); if(i>=0)db.despesas[i]=item; editDespesaId=null}else db.despesas.push(item); salvarDB(); renderDespesas();}

function listarDespesas(){let mes=fDespMes.value,ano=fDespAno.value,status=fDespStatus.value,cat=fDespCategoria.value; let lista=db.despesas.filter(d=>{let dataBase=d.situacao==='Pago'&&d.dataPagamento?d.dataPagamento:(d.dataVencimento||d.data); let st=calcularStatusDespesa(d); return mesmoMesAno(dataBase,mes,ano)&&(!status||st===status)&&(!cat||d.categoriaDesp===cat)}); let total=lista.reduce((a,d)=>a+Number(d.valor||0),0), pago=lista.filter(d=>d.situacao==='Pago').reduce((a,d)=>a+Number(d.valor||0),0), aberto=total-pago, vencido=lista.filter(d=>calcularStatusDespesa(d)==='Vencido').reduce((a,d)=>a+Number(d.valor||0),0); listaDespesas.innerHTML=`<div class="dashboard-cards"><div class="card"><div>Total filtrado</div><div class="card-value">${moeda(total)}</div></div><div class="card"><div>Pago</div><div class="card-value">${moeda(pago)}</div></div><div class="card"><div>Em aberto</div><div class="card-value">${moeda(aberto)}</div></div><div class="card"><div>Vencido</div><div class="card-value">${moeda(vencido)}</div></div></div><div class="table-wrap"><table><tr><th>Vencimento</th><th>Pagamento</th><th>Descrição</th><th>Fornecedor</th><th>Categoria</th><th>Valor</th><th>Forma</th><th>Status</th><th>Ações</th></tr>${lista.map(d=>{let st=calcularStatusDespesa(d);let acaoStatus=st==='Pago'?`<button class="mini-btn warning" onclick="reabrirDespesa(${d.id})">↩️ Reabrir</button>`:`<button class="mini-btn warning" onclick="pagarDespesa(${d.id})">✅ Pagar</button>`;return `<tr><td>${formatarDataBR(d.dataVencimento)||''}</td><td>${d.dataPagamento?formatarDataBR(d.dataPagamento):'-'}</td><td>${escapeHtml(d.tipo)}</td><td>${escapeHtml(d.fornecedor||'')}</td><td>${escapeHtml(d.categoriaDesp||'')}</td><td>${moeda(d.valor)}</td><td>${escapeHtml(d.pagamento||'')}</td><td>${badgeStatusDespesa(st)}</td><td><div class="quick-actions">${acaoStatus}<button class="mini-btn info" onclick="editarDespesa(${d.id})">✏️ Editar</button><button class="mini-btn danger" onclick="excluirDespesa(${d.id})">🗑️ Excluir</button></div></td></tr>`}).join('')||'<tr><td colspan="9">Sem despesas.</td></tr>'}</table></div>`;}
function editarDespesa(id){editDespesaId=id;renderDespesas()} function excluirDespesa(id){if(confirm('Excluir despesa?')){db.despesas=db.despesas.filter(d=>d.id!==id);salvarDB();renderDespesas()}} function pagarDespesa(id){let d=db.despesas.find(x=>x.id===id); if(!d)return; if(!confirm('Confirmar pagamento desta despesa com a data de hoje?'))return; let data=hojeISO(); d.dataPagamento=data; d.situacao='Pago'; d.data=data; salvarDB(); listarDespesas()} function reabrirDespesa(id){if(!confirm('Remover pagamento e voltar a despesa para aberto?'))return; let d=db.despesas.find(x=>x.id===id); if(!d)return; d.dataPagamento=''; d.situacao='Pendente'; d.data=d.dataVencimento; salvarDB(); listarDespesas()}

function statusMeta(valor,meta,tipo='maiorMelhor'){
    valor=Number(valor)||0; meta=Number(meta)||0;
    if(!meta)return {txt:'Sem meta',cls:'sem-warning',card:'vista-warning'};
    if(tipo==='menorMelhor'){
        if(valor<=meta)return {txt:'Dentro da meta',cls:'sem-good',card:'vista-good'};
        if(valor<=meta*1.2)return {txt:'Atenção',cls:'sem-warning',card:'vista-warning'};
        return {txt:'Crítico',cls:'sem-danger',card:'vista-danger'};
    }
    if(valor>=meta)return {txt:'Dentro da meta',cls:'sem-good',card:'vista-good'};
    if(valor>=meta*0.8)return {txt:'Atenção',cls:'sem-warning',card:'vista-warning'};
    return {txt:'Crítico',cls:'sem-danger',card:'vista-danger'};
}
function dadosPeriodoGestao(mes,ano){
    let vendas=db.vendas.filter(v=>mesmoMesAno(v.data,mes,ano));
    let producao=db.producao.filter(p=>mesmoMesAno(p.data,mes,ano));
    let despesas=db.despesas.filter(d=>{let dataBase=d.situacao==='Pago'&&d.dataPagamento?d.dataPagamento:(d.dataVencimento||d.dataLancamento||d.data); return mesmoMesAno(dataBase,mes,ano)});
    let despPagas=despesas.filter(d=>d.situacao==='Pago');
    let r=resumoProducao(producao);
    let faturamento=vendas.reduce((a,v)=>a+(Number(v.total)||0),0);
    let custos=despPagas.reduce((a,d)=>a+(Number(d.valor)||0),0);
    let resultado=faturamento-custos;
    let volumeVendido=vendas.reduce((a,v)=>a+(Number(v.quantidade)||0),0);
    let ativos=cooperadosAtivosLista().length;
    let faltas=contarFaltas(mes,ano);
    let freq=freqMedia(mes,ano);
    let ocorrenciasMes=db.ocorrenciasSaude.filter(o=>mesmoMesAno(o.data,mes,ano));
    let acidentes=ocorrenciasMes.length;
    let afastados=new Set(db.ocorrenciasSaude.filter(o=>temAfastamentoAtivo(o)).map(o=>String(o.cooperadoId))).size;
    let diasPerdidos=(db.ocorrenciasSaude||[]).reduce((a,o)=>a+diasPerdidosNoPeriodo(o,mes,ano),0);
    let semAcidente=diasSemAcidente();
    let retirada=ativos?resultado/ativos:0;
    return {faturamento,custos,resultado,producao:r.total,rejeito:r.rejeito,eficiencia:r.eficiencia,volumeVendido,ativos,faltas,freq,acidentes,afastados,diasPerdidos,semAcidente,retirada};
}
function metaValor(chave,padrao=0){return Number((db.metasVista||{})[chave]??padrao)||0}
function salvarMetasVista(){
    db.metasVista={faturamento:Number(metaFaturamento.value)||0,despesas:Number(metaDespesas.value)||0,resultado:Number(metaResultado.value)||0,producao:Number(metaProducao.value)||0,rejeito:Number(metaRejeito.value)||0,frequencia:Number(metaFrequencia.value)||0,acidentes:Number(metaAcidentes.value)||0,retirada:Number(metaRetirada.value)||0};
    salvarDB(); carregarGestaoVista(); alert('Metas salvas.');
}
function cardVista(icon,titulo,valor,meta,status){return `<div class="vista-card ${status.card}"><div class="vista-card-top"><div><div class="vista-title">${titulo}</div><div class="vista-value">${valor}</div><div class="vista-meta">Meta: ${meta}</div></div><div class="vista-icon">${icon}</div></div><div><span class="semaforo ${status.cls}">${status.txt}</span></div></div>`}
function renderGestaoVista(){dynamicView().innerHTML=`<div class="card-panel"><div class="section-title"><div><h2>🧭 Gestão à Vista</h2><p class="muted">Painel visual para acompanhamento mensal da cooperativa.</p></div><span class="muted">Leitura rápida, estilo quadro operacional</span></div><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="gvMes">${optMes(mesAtual(),true)}</select></div><div class="filter-field"><label>Ano</label><select id="gvAno">${optAno()}</select></div><button id="btnGV" class="info">Atualizar</button></div><div id="gvPainel"></div></div><div class="card-panel"><h3>🎯 Metas da Gestão à Vista</h3><div class="notice">As metas alimentam o semáforo dos indicadores. Deixe em branco ou zero quando ainda não houver meta definida.</div><div class="meta-grid"><div class="field meta-box"><label>Valor arrecadado mínimo</label><input type="number" id="metaFaturamento" value="${metaValor('faturamento')}"></div><div class="field meta-box"><label>Despesa máxima</label><input type="number" id="metaDespesas" value="${metaValor('despesas')}"></div><div class="field meta-box"><label>Resultado mínimo</label><input type="number" id="metaResultado" value="${metaValor('resultado')}"></div><div class="field meta-box"><label>Material triado mínimo kg</label><input type="number" id="metaProducao" value="${metaValor('producao')}"></div><div class="field meta-box"><label>Rejeito máximo kg</label><input type="number" id="metaRejeito" value="${metaValor('rejeito')}"></div><div class="field meta-box"><label>Frequência mínima %</label><input type="number" id="metaFrequencia" value="${metaValor('frequencia',90)}"></div><div class="field meta-box"><label>Acidentes máximos</label><input type="number" id="metaAcidentes" value="${metaValor('acidentes',0)}"></div><div class="field meta-box"><label>Retirada média mínima</label><input type="number" id="metaRetirada" value="${metaValor('retirada')}"></div></div><div class="btn-row" style="margin-top:1rem"><button id="salvarMetas" class="info">Salvar Metas</button></div></div>`; btnGV.onclick=carregarGestaoVista; salvarMetas.onclick=salvarMetasVista; carregarGestaoVista();}
function carregarGestaoVista(){let mes=gvMes.value,ano=gvAno.value,d=dadosPeriodoGestao(mes,ano); let rotuloOcorrencias=mes?'Ocorrências do mês':'Ocorrências do período'; let rotuloFaltas=mes?'Faltas no mês':'Faltas no período'; let html=`<div class="vista-grid">${cardVista('💰','Valor Arrecadado',moeda(d.faturamento),metaValor('faturamento')?moeda(metaValor('faturamento')):'Sem meta',statusMeta(d.faturamento,metaValor('faturamento')))}${cardVista('💸','Despesas pagas',moeda(d.custos),metaValor('despesas')?moeda(metaValor('despesas')):'Sem meta',statusMeta(d.custos,metaValor('despesas'),'menorMelhor'))}${cardVista('📈','Resultado',moeda(d.resultado),metaValor('resultado')?moeda(metaValor('resultado')):'Sem meta',statusMeta(d.resultado,metaValor('resultado')))}${cardVista('♻️','Material Triado',num(d.producao)+' kg',metaValor('producao')?num(metaValor('producao'))+' kg':'Sem meta',statusMeta(d.producao,metaValor('producao')))}${cardVista('🗑️','Rejeito',num(d.rejeito)+' kg',metaValor('rejeito')?num(metaValor('rejeito'))+' kg':'Sem meta',statusMeta(d.rejeito,metaValor('rejeito'),'menorMelhor'))}${cardVista('⚙️','Eficiência da triagem',num(d.eficiencia,1)+'%','Quanto maior, melhor',statusMeta(d.eficiencia,80))}${cardVista('👥','Cooperados ativos',String(d.ativos),'Cadastro de cooperados',statusMeta(d.ativos,1))}${cardVista('📅','Frequência média',num(d.freq,1)+'%',metaValor('frequencia')?num(metaValor('frequencia'),1)+'%':'90%',statusMeta(d.freq,metaValor('frequencia',90)))}${cardVista('❌',rotuloFaltas,String(d.faltas),'Quanto menor, melhor',statusMeta(d.faltas,0,'menorMelhor'))}${cardVista('🚑',rotuloOcorrencias,String(d.acidentes),metaValor('acidentes')?String(metaValor('acidentes')):'0',statusMeta(d.acidentes,metaValor('acidentes',0),'menorMelhor'))}${cardVista('🏥','Cooperados afastados',String(d.afastados),'0',statusMeta(d.afastados,0,'menorMelhor'))}${cardVista('📅','Dias perdidos',String(d.diasPerdidos)+' dias','Quanto menor, melhor',statusMeta(d.diasPerdidos,0,'menorMelhor'))}${cardVista('🟢','Dias sem acidente',d.semAcidente===null?'Sem registro':String(d.semAcidente)+' dias','Quanto maior, melhor',d.semAcidente===null?statusMeta(0,0):statusMeta(d.semAcidente,30))}${cardVista('💵','Retirada média',moeda(d.retirada),metaValor('retirada')?moeda(metaValor('retirada')):'Sem meta',statusMeta(d.retirada,metaValor('retirada')))}</div><div class="notice" style="margin-top:1rem"><strong>Leitura do painel:</strong> os indicadores são alimentados por Vendas, Despesas, Produção, Cadastro de Cooperados, Frequência e Saúde.</div>`; gvPainel.innerHTML=html;}
function contarFaltas(mes,ano){return db.frequencia.filter(f=>mesmoMesAno(f.data,mes,ano)&&f.status==='A').length}
function freqMedia(mes,ano){let regs=db.frequencia.filter(f=>mesmoMesAno(f.data,mes,ano)&&(f.status==='P'||f.status==='A')); if(!regs.length)return 0; let pres=regs.filter(f=>f.status==='P').length; return pres/regs.length*100}

function diffDiasInclusivo(dataInicio,dataFim){let ini=getDate(dataInicio),fim=getDate(dataFim||hojeISO()); if(!ini||!fim||fim<ini)return 0; return Math.floor((fim-ini)/(1000*60*60*24))+1}
function statusOcorrencia(o){if(o.status)return o.status; if(String(o.afastamento)==='Sim')return 'Afastado'; return 'Encerrada'}
function temAfastamentoAtivo(o){return String(o.afastamento)==='Sim'&&statusOcorrencia(o)!=='Encerrada'}
function dataFimOcorrencia(o){return statusOcorrencia(o)==='Encerrada'&&o.dataRetorno?o.dataRetorno:hojeISO()}
function diasAfastamentoOcorrencia(o){if(String(o.afastamento)!=='Sim')return 0; return diffDiasInclusivo(o.data,dataFimOcorrencia(o))}
function diasPerdidosNoPeriodo(o,mes,ano){
    if(String(o.afastamento)!=='Sim')return 0;
    let ini=getDate(o.data),fim=getDate(dataFimOcorrencia(o));
    if(!ini||!fim)return 0;
    let iniPeriodo,fimPeriodo;
    if(!mes){
        iniPeriodo=getDate(`${ano}-01-01`);
        fimPeriodo=getDate(`${ano}-12-31`);
    }else{
        iniPeriodo=getDate(`${ano}-${String(mes).padStart(2,'0')}-01`);
        fimPeriodo=getDate(`${ano}-${String(mes).padStart(2,'0')}-${String(diasNoMes(mes,ano)).padStart(2,'0')}`);
    }
    if(!iniPeriodo||!fimPeriodo)return 0;
    let inicio=ini>iniPeriodo?ini:iniPeriodo;
    let final=fim<fimPeriodo?fim:fimPeriodo;
    if(final<inicio)return 0;
    let dias=Math.floor((final-inicio)/(1000*60*60*24))+1;
    return Number.isFinite(dias)?dias:0;
}
function diasSemAcidente(){let ocorrencias=(db.ocorrenciasSaude||[]).filter(o=>o.data).sort((a,b)=>String(b.data).localeCompare(String(a.data))); if(!ocorrencias.length)return null; return Math.max(0,Math.floor((getDate(hojeISO())-getDate(ocorrencias[0].data))/(1000*60*60*24)))}
function chipStatusOcorrencia(st){let cls=st==='Encerrada'?'chip-pago':st==='Afastado'?'chip-vencido':'chip-pendente'; return `<span class="status-chip ${cls}">${escapeHtml(st)}</span>`}
function getFreqRegistro(coopId,data){return db.frequencia.find(f=>String(f.cooperadoId)===String(coopId)&&f.data===data)}
function cicloFreq(status){return status==='P'?'A':status==='A'?'N':'P'}
function setFrequencia(coopId,data,status){let reg=getFreqRegistro(coopId,data); if(status==='N'){if(reg)db.frequencia=db.frequencia.filter(f=>f.id!==reg.id)}else if(reg){reg.status=status}else{db.frequencia.push({id:Date.now()+Math.random(),cooperadoId:coopId,data,status})} salvarDB(); carregarFrequencia();}
function toggleFrequencia(coopId,data){let reg=getFreqRegistro(coopId,data); let novo=reg?.status==='P'?'A':reg?.status==='A'?'N':'P'; setFrequencia(coopId,data,novo);}
function renderPessoas(){dynamicView().innerHTML=`<div class="card-panel"><div class="section-title"><div><h2>👥 Pessoas</h2><p class="muted">Frequência mensal e saúde/segurança dos cooperados.</p></div></div><div class="tabs"><button id="tabFreq" class="tab-btn active">📅 Frequência Mensal</button><button id="tabSaude" class="tab-btn">🚑 Saúde e Segurança</button></div><div id="pessoasConteudo"></div></div>`; tabFreq.onclick=()=>{tabFreq.classList.add('active');tabSaude.classList.remove('active');renderFrequencia()}; tabSaude.onclick=()=>{tabSaude.classList.add('active');tabFreq.classList.remove('active');renderSaude()}; renderFrequencia();}
function renderFrequencia(){pessoasConteudo.innerHTML=`<div class="notice"><strong>Chamada mensal:</strong> a lista é gerada automaticamente com os cooperados ativos. Em cada dia, selecione Presença, Ausência ou deixe sem informação.</div><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="freqMes">${optMes(mesAtual(),true)}</select></div><div class="filter-field"><label>Ano</label><select id="freqAno">${optAno()}</select></div><button id="btnFreq" class="info">Atualizar</button></div><div id="freqResumo"></div><div id="freqTabela"></div>`; btnFreq.onclick=carregarFrequencia; carregarFrequencia();}
function carregarFrequencia(){let mes=Number(freqMes.value),ano=Number(freqAno.value),dias=diasNoMes(mes,ano),coops=cooperadosAtivosLista(); let faltas=contarFaltas(mes,ano),freq=freqMedia(mes,ano); freqResumo.innerHTML=`<div class="dashboard-cards"><div class="card"><div>Cooperados ativos</div><div class="card-value">${coops.length}</div></div><div class="card"><div>Frequência média</div><div class="card-value">${num(freq,1)}%</div></div><div class="card"><div>Faltas no mês</div><div class="card-value">${faltas}</div></div></div>`; if(!coops.length){freqTabela.innerHTML='<div class="empty">Cadastre cooperados ativos para gerar a frequência.</div>';return} let head=Array.from({length:dias},(_,i)=>`<th>${String(i+1).padStart(2,'0')}</th>`).join(''); let rows=coops.map(c=>{let tds=Array.from({length:dias},(_,i)=>{let dia=String(i+1).padStart(2,'0'),data=`${ano}-${String(mes).padStart(2,'0')}-${dia}`,reg=getFreqRegistro(c.id,data),st=reg?.status||'N',cls=st==='P'?'presente':st==='A'?'ausente':'neutro';return `<td><select class="freq-select ${cls}" onchange="setFrequencia(${c.id},'${data}',this.value)"><option value="N" ${st==='N'?'selected':''}>-</option><option value="P" ${st==='P'?'selected':''}>Presença</option><option value="A" ${st==='A'?'selected':''}>Ausência</option></select></td>`}).join(''); let regs=db.frequencia.filter(f=>String(f.cooperadoId)===String(c.id)&&mesmoMesAno(f.data,mes,ano)); let p=regs.filter(f=>f.status==='P').length,a=regs.filter(f=>f.status==='A').length,perc=(p+a)?p/(p+a)*100:0; return `<tr><td style="text-align:left"><strong>${escapeHtml(c.nome)}</strong><br><span class="muted">${escapeHtml(c.funcao||'')}</span></td>${tds}<td><strong>${p}</strong></td><td><strong>${a}</strong></td><td><strong>${num(perc,1)}%</strong></td></tr>`}).join(''); freqTabela.innerHTML=`<div class="table-wrap"><table class="freq-table"><tr><th>Cooperado</th>${head}<th>Pres.</th><th>Aus.</th><th>%</th></tr>${rows}</table></div>`;}
function renderSaude(){let coops=cooperadosAtivosLista(); pessoasConteudo.innerHTML=`<div class="notice"><strong>Registro de saúde e segurança:</strong> registre a ocorrência uma única vez. Se houver afastamento, os dias perdidos são calculados automaticamente até a data de retorno ou até o encerramento.</div><div class="form-grid"><div class="field"><label>Data da ocorrência</label><input type="date" id="ocData" value="${hojeISO()}"></div><div class="field"><label>Cooperado</label><select id="ocCoop">${coops.map(c=>`<option value="${c.id}">${escapeHtml(c.nome)}</option>`).join('')}</select></div><div class="field"><label>Tipo de ocorrência</label><select id="ocTipo"><option>Corte</option><option>Queda</option><option>Perfuração</option><option>Contusão</option><option>Mal-estar</option><option>Outro</option></select></div><div class="field"><label>Houve afastamento?</label><select id="ocAfastamento"><option>Não</option><option>Sim</option></select></div><div class="field"><label>Status</label><select id="ocStatus"><option>Aberta</option><option>Afastado</option><option>Encerrada</option></select></div><div class="field"><label>Data de retorno / encerramento</label><input type="date" id="ocRetorno"></div><div class="field"><label>Observações</label><textarea id="ocObs" placeholder="Descrição resumida"></textarea></div></div><div class="btn-row"><button id="salvarOcorrencia" class="info">${editOcorrenciaId?'Atualizar Ocorrência':'Registrar Ocorrência'}</button><button id="cancelarOcorrencia" class="secondary" style="display:${editOcorrenciaId?'inline-block':'none'}">Cancelar edição</button></div><hr style="margin:1rem 0;border:none;border-top:1px solid #e1e6eb"><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="saudeMes">${optMes(mesAtual(),true)}</select></div><div class="filter-field"><label>Ano</label><select id="saudeAno">${optAno()}</select></div><button id="btnSaude" class="info">Atualizar</button></div><div id="saudeLista"></div>`; ocAfastamento.onchange=()=>{if(ocAfastamento.value==='Sim'){ocStatus.value='Afastado';ocRetorno.value=''}else{ocStatus.value='Encerrada';ocRetorno.value=ocData.value}}; salvarOcorrencia.onclick=salvarOcorrenciaSaude; cancelarOcorrencia.onclick=()=>{editOcorrenciaId=null;renderSaude()}; btnSaude.onclick=listarOcorrenciasSaude; if(editOcorrenciaId)popularFormOcorrenciaSaude(editOcorrenciaId); listarOcorrenciasSaude();}
function salvarOcorrenciaSaude(){if(!ocData.value||!ocCoop.value)return alert('Informe data e cooperado.'); let afastamento=ocAfastamento.value,status=ocStatus.value,dataRetorno=ocRetorno.value; if(afastamento==='Não'){status='Encerrada'; dataRetorno=ocData.value} if(afastamento==='Sim'&&status!=='Encerrada'){dataRetorno=''} if(status==='Aberta'&&afastamento==='Sim')status='Afastado'; if(status==='Encerrada'&&afastamento==='Sim'&&!dataRetorno)return alert('Informe a data de retorno/encerramento ou mantenha o status como Afastado.'); let item={id:editOcorrenciaId||Date.now(),data:ocData.value,cooperadoId:ocCoop.value,tipo:ocTipo.value,afastamento,status,dataRetorno,obs:ocObs.value}; if(editOcorrenciaId){let i=db.ocorrenciasSaude.findIndex(o=>o.id===editOcorrenciaId); if(i>=0)db.ocorrenciasSaude[i]=item; editOcorrenciaId=null;}else{db.ocorrenciasSaude.push(item);} salvarDB(); renderSaude();}
function popularFormOcorrenciaSaude(id){let o=db.ocorrenciasSaude.find(x=>x.id===id); if(!o)return; ocData.value=o.data||hojeISO(); ocCoop.value=o.cooperadoId||''; ocTipo.value=o.tipo||'Corte'; ocAfastamento.value=o.afastamento||'Não'; ocStatus.value=o.status||statusOcorrencia(o)||'Aberta'; ocRetorno.value=o.dataRetorno||''; ocObs.value=o.obs||'';}

️ Excluir</button></div></td></tr>`}).join('')||'<tr><td colspan="9">Sem ocorrências no período.</td></tr>'}</table></div>`;}
function encerrarOcorrenciaSaude(id){let o=db.ocorrenciasSaude.find(x=>x.id===id); if(!o)return; let data=prompt('Informe a data de retorno/encerramento (AAAA-MM-DD):',hojeISO()); if(!data)return; o.status='Encerrada'; o.dataRetorno=data; salvarDB(); listarOcorrenciasSaude();}

function renderGestaoVista(){dynamicView().innerHTML=`<div class="card-panel"><div class="section-title"><div><h2>🧭 Gestão à Vista</h2><p class="muted">Painel visual para acompanhamento mensal da cooperativa.</p></div><span class="muted">Leitura rápida, estilo quadro operacional</span></div><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="gvMes">${optMes(mesAtual(),true)}</select></div><div class="filter-field"><label>Ano</label><select id="gvAno">${optAno()}</select></div><button id="btnGV" class="info">Atualizar</button></div><div id="gvPainel"></div></div><div class="card-panel"><h3>🎯 Metas da Gestão à Vista</h3><div class="notice">As metas alimentam o semáforo dos indicadores. Deixe em branco ou zero quando ainda não houver meta definida.</div><div class="meta-grid"><div class="field meta-box"><label>Valor arrecadado mínimo</label><input type="number" id="metaFaturamento" value="${metaValor('faturamento')}"></div><div class="field meta-box"><label>Despesa máxima</label><input type="number" id="metaDespesas" value="${metaValor('despesas')}"></div><div class="field meta-box"><label>Resultado mínimo</label><input type="number" id="metaResultado" value="${metaValor('resultado')}"></div><div class="field meta-box"><label>Material triado mínimo kg</label><input type="number" id="metaProducao" value="${metaValor('producao')}"></div><div class="field meta-box"><label>Rejeito máximo kg</label><input type="number" id="metaRejeito" value="${metaValor('rejeito')}"></div><div class="field meta-box"><label>Frequência mínima %</label><input type="number" id="metaFrequencia" value="${metaValor('frequencia',90)}"></div><div class="field meta-box"><label>Acidentes máximos</label><input type="number" id="metaAcidentes" value="${metaValor('acidentes',0)}"></div><div class="field meta-box"><label>Retirada média mínima</label><input type="number" id="metaRetirada" value="${metaValor('retirada')}"></div></div><div class="btn-row" style="margin-top:1rem"><button id="salvarMetas" class="info">Salvar Metas</button></div></div>`; btnGV.onclick=carregarGestaoVista; salvarMetas.onclick=salvarMetasVista; carregarGestaoVista();}
function carregarGestaoVista(){let mes=gvMes.value,ano=gvAno.value,d=dadosPeriodoGestao(mes,ano); let rotuloOcorrencias=mes?'Ocorrências do mês':'Ocorrências do período'; let rotuloFaltas=mes?'Faltas no mês':'Faltas no período'; let html=`<div class="vista-grid">${cardVista('💰','Valor Arrecadado',moeda(d.faturamento),metaValor('faturamento')?moeda(metaValor('faturamento')):'Sem meta',statusMeta(d.faturamento,metaValor('faturamento')))}${cardVista('💸','Despesas pagas',moeda(d.custos),metaValor('despesas')?moeda(metaValor('despesas')):'Sem meta',statusMeta(d.custos,metaValor('despesas'),'menorMelhor'))}${cardVista('📈','Resultado',moeda(d.resultado),metaValor('resultado')?moeda(metaValor('resultado')):'Sem meta',statusMeta(d.resultado,metaValor('resultado')))}${cardVista('♻️','Material Triado',num(d.producao)+' kg',metaValor('producao')?num(metaValor('producao'))+' kg':'Sem meta',statusMeta(d.producao,metaValor('producao')))}${cardVista('🗑️','Rejeito',num(d.rejeito)+' kg',metaValor('rejeito')?num(metaValor('rejeito'))+' kg':'Sem meta',statusMeta(d.rejeito,metaValor('rejeito'),'menorMelhor'))}${cardVista('⚙️','Eficiência da triagem',num(d.eficiencia,1)+'%','Quanto maior, melhor',statusMeta(d.eficiencia,80))}${cardVista('👥','Cooperados ativos',String(d.ativos),'Cadastro de cooperados',statusMeta(d.ativos,1))}${cardVista('📅','Frequência média',num(d.freq,1)+'%',metaValor('frequencia')?num(metaValor('frequencia'),1)+'%':'90%',statusMeta(d.freq,metaValor('frequencia',90)))}${cardVista('❌',rotuloFaltas,String(d.faltas),'Quanto menor, melhor',statusMeta(d.faltas,0,'menorMelhor'))}${cardVista('🚑',rotuloOcorrencias,String(d.acidentes),metaValor('acidentes')?String(metaValor('acidentes')):'0',statusMeta(d.acidentes,metaValor('acidentes',0),'menorMelhor'))}${cardVista('🏥','Cooperados afastados',String(d.afastados),'0',statusMeta(d.afastados,0,'menorMelhor'))}${cardVista('📅','Dias perdidos',String(d.diasPerdidos)+' dias','Quanto menor, melhor',statusMeta(d.diasPerdidos,0,'menorMelhor'))}${cardVista('🟢','Dias sem acidente',d.semAcidente===null?'Sem registro':String(d.semAcidente)+' dias','Quanto maior, melhor',d.semAcidente===null?statusMeta(0,0):statusMeta(d.semAcidente,30))}${cardVista('💵','Retirada média',moeda(d.retirada),metaValor('retirada')?moeda(metaValor('retirada')):'Sem meta',statusMeta(d.retirada,metaValor('retirada')))}</div><div class="notice" style="margin-top:1rem"><strong>Leitura do painel:</strong> os indicadores são alimentados por Vendas, Despesas, Produção, Cadastro de Cooperados, Frequência e Saúde.</div>`; gvPainel.innerHTML=html;}
function contarFaltas(mes,ano){return db.frequencia.filter(f=>mesmoMesAno(f.data,mes,ano)&&f.status==='A').length}
function freqMedia(mes,ano){let regs=db.frequencia.filter(f=>mesmoMesAno(f.data,mes,ano)&&(f.status==='P'||f.status==='A')); if(!regs.length)return 0; let pres=regs.filter(f=>f.status==='P').length; return pres/regs.length*100}

function diffDiasInclusivo(dataInicio,dataFim){let ini=getDate(dataInicio),fim=getDate(dataFim||hojeISO()); if(!ini||!fim||fim<ini)return 0; return Math.floor((fim-ini)/(1000*60*60*24))+1}
function statusOcorrencia(o){if(o.status)return o.status; if(String(o.afastamento)==='Sim')return 'Afastado'; return 'Encerrada'}
function temAfastamentoAtivo(o){return String(o.afastamento)==='Sim'&&statusOcorrencia(o)!=='Encerrada'}
function dataFimOcorrencia(o){return statusOcorrencia(o)==='Encerrada'&&o.dataRetorno?o.dataRetorno:hojeISO()}
function diasAfastamentoOcorrencia(o){if(String(o.afastamento)!=='Sim')return 0; return diffDiasInclusivo(o.data,dataFimOcorrencia(o))}
function diasPerdidosNoPeriodo(o,mes,ano){
    if(String(o.afastamento)!=='Sim')return 0;
    let ini=getDate(o.data),fim=getDate(dataFimOcorrencia(o));
    if(!ini||!fim)return 0;
    let iniPeriodo,fimPeriodo;
    if(!mes){
        iniPeriodo=getDate(`${ano}-01-01`);
        fimPeriodo=getDate(`${ano}-12-31`);
    }else{
        iniPeriodo=getDate(`${ano}-${String(mes).padStart(2,'0')}-01`);
        fimPeriodo=getDate(`${ano}-${String(mes).padStart(2,'0')}-${String(diasNoMes(mes,ano)).padStart(2,'0')}`);
    }
    if(!iniPeriodo||!fimPeriodo)return 0;
    let inicio=ini>iniPeriodo?ini:iniPeriodo;
    let final=fim<fimPeriodo?fim:fimPeriodo;
    if(final<inicio)return 0;
    let dias=Math.floor((final-inicio)/(1000*60*60*24))+1;
    return Number.isFinite(dias)?dias:0;
}
function diasSemAcidente(){let ocorrencias=(db.ocorrenciasSaude||[]).filter(o=>o.data).sort((a,b)=>String(b.data).localeCompare(String(a.data))); if(!ocorrencias.length)return null; return Math.max(0,Math.floor((getDate(hojeISO())-getDate(ocorrencias[0].data))/(1000*60*60*24)))}
function chipStatusOcorrencia(st){let cls=st==='Encerrada'?'chip-pago':st==='Afastado'?'chip-vencido':'chip-pendente'; return `<span class="status-chip ${cls}">${escapeHtml(st)}</span>`}
function getFreqRegistro(coopId,data){return db.frequencia.find(f=>String(f.cooperadoId)===String(coopId)&&f.data===data)}
function cicloFreq(status){return status==='P'?'A':status==='A'?'N':'P'}
function setFrequencia(coopId,data,status){let reg=getFreqRegistro(coopId,data); if(status==='N'){if(reg)db.frequencia=db.frequencia.filter(f=>f.id!==reg.id)}else if(reg){reg.status=status}else{db.frequencia.push({id:Date.now()+Math.random(),cooperadoId:coopId,data,status})} salvarDB(); carregarFrequencia();}
function toggleFrequencia(coopId,data){let reg=getFreqRegistro(coopId,data); let novo=reg?.status==='P'?'A':reg?.status==='A'?'N':'P'; setFrequencia(coopId,data,novo);}
function renderPessoas(){dynamicView().innerHTML=`<div class="card-panel"><div class="section-title"><div><h2>👥 Pessoas</h2><p class="muted">Frequência mensal e saúde/segurança dos cooperados.</p></div></div><div class="tabs"><button id="tabFreq" class="tab-btn active">📅 Frequência Mensal</button><button id="tabSaude" class="tab-btn">🚑 Saúde e Segurança</button></div><div id="pessoasConteudo"></div></div>`; tabFreq.onclick=()=>{tabFreq.classList.add('active');tabSaude.classList.remove('active');renderFrequencia()}; tabSaude.onclick=()=>{tabSaude.classList.add('active');tabFreq.classList.remove('active');renderSaude()}; renderFrequencia();}
function renderFrequencia(){pessoasConteudo.innerHTML=`<div class="notice"><strong>Chamada mensal:</strong> a lista é gerada automaticamente com os cooperados ativos. Em cada dia, selecione Presença, Ausência ou deixe sem informação.</div><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="freqMes">${optMes(mesAtual(),true)}</select></div><div class="filter-field"><label>Ano</label><select id="freqAno">${optAno()}</select></div><button id="btnFreq" class="info">Atualizar</button></div><div id="freqResumo"></div><div id="freqTabela"></div>`; btnFreq.onclick=carregarFrequencia; carregarFrequencia();}
function carregarFrequencia(){let mes=Number(freqMes.value),ano=Number(freqAno.value),dias=diasNoMes(mes,ano),coops=cooperadosAtivosLista(); let faltas=contarFaltas(mes,ano),freq=freqMedia(mes,ano); freqResumo.innerHTML=`<div class="dashboard-cards"><div class="card"><div>Cooperados ativos</div><div class="card-value">${coops.length}</div></div><div class="card"><div>Frequência média</div><div class="card-value">${num(freq,1)}%</div></div><div class="card"><div>Faltas no mês</div><div class="card-value">${faltas}</div></div></div>`; if(!coops.length){freqTabela.innerHTML='<div class="empty">Cadastre cooperados ativos para gerar a frequência.</div>';return} let head=Array.from({length:dias},(_,i)=>`<th>${String(i+1).padStart(2,'0')}</th>`).join(''); let rows=coops.map(c=>{let tds=Array.from({length:dias},(_,i)=>{let dia=String(i+1).padStart(2,'0'),data=`${ano}-${String(mes).padStart(2,'0')}-${dia}`,reg=getFreqRegistro(c.id,data),st=reg?.status||'N',cls=st==='P'?'presente':st==='A'?'ausente':'neutro';return `<td><select class="freq-select ${cls}" onchange="setFrequencia(${c.id},'${data}',this.value)"><option value="N" ${st==='N'?'selected':''}>-</option><option value="P" ${st==='P'?'selected':''}>Presença</option><option value="A" ${st==='A'?'selected':''}>Ausência</option></select></td>`}).join(''); let regs=db.frequencia.filter(f=>String(f.cooperadoId)===String(c.id)&&mesmoMesAno(f.data,mes,ano)); let p=regs.filter(f=>f.status==='P').length,a=regs.filter(f=>f.status==='A').length,perc=(p+a)?p/(p+a)*100:0; return `<tr><td style="text-align:left"><strong>${escapeHtml(c.nome)}</strong><br><span class="muted">${escapeHtml(c.funcao||'')}</span></td>${tds}<td><strong>${p}</strong></td><td><strong>${a}</strong></td><td><strong>${num(perc,1)}%</strong></td></tr>`}).join(''); freqTabela.innerHTML=`<div class="table-wrap"><table class="freq-table"><tr><th>Cooperado</th>${head}<th>Pres.</th><th>Aus.</th><th>%</th></tr>${rows}</table></div>`;}
function renderSaude(){let coops=cooperadosAtivosLista(); pessoasConteudo.innerHTML=`<div class="notice"><strong>Registro de saúde e segurança:</strong> registre a ocorrência uma única vez. Se houver afastamento, os dias perdidos são calculados automaticamente até a data de retorno ou até o encerramento.</div><div class="form-grid"><div class="field"><label>Data da ocorrência</label><input type="date" id="ocData" value="${hojeISO()}"></div><div class="field"><label>Cooperado</label><select id="ocCoop">${coops.map(c=>`<option value="${c.id}">${escapeHtml(c.nome)}</option>`).join('')}</select></div><div class="field"><label>Tipo de ocorrência</label><select id="ocTipo"><option>Corte</option><option>Queda</option><option>Perfuração</option><option>Contusão</option><option>Mal-estar</option><option>Outro</option></select></div><div class="field"><label>Houve afastamento?</label><select id="ocAfastamento"><option>Não</option><option>Sim</option></select></div><div class="field"><label>Status</label><select id="ocStatus"><option>Aberta</option><option>Afastado</option><option>Encerrada</option></select></div><div class="field"><label>Data de retorno / encerramento</label><input type="date" id="ocRetorno"></div><div class="field"><label>Observações</label><textarea id="ocObs" placeholder="Descrição resumida"></textarea></div></div><div class="btn-row"><button id="salvarOcorrencia" class="info">Registrar Ocorrência</button></div><hr style="margin:1rem 0;border:none;border-top:1px solid #e1e6eb"><div class="filter-bar"><div class="filter-field"><label>Mês</label><select id="saudeMes">${optMes(mesAtual(),true)}</select></div><div class="filter-field"><label>Ano</label><select id="saudeAno">${optAno()}</select></div><button id="btnSaude" class="info">Atualizar</button></div><div id="saudeLista"></div>`; ocAfastamento.onchange=()=>{if(ocAfastamento.value==='Sim'){ocStatus.value='Afastado';ocRetorno.value=''}else{ocStatus.value='Encerrada';ocRetorno.value=ocData.value}}; salvarO function salvarOcorrenciaSaude(){if(!ocData.value||!ocCoop.value)return alert('Informe data e cooperado.'); let afastamento=ocAfastamento.value,status=ocStatus.value,dataRetorno=ocRetorno.value; if(afastamento==='Não'){status='Encerrada'; dataRetorno=ocData.value} if(afastamento==='Sim'&&status!=='Encerrada'){dataRetorno=''} if(status==='Aberta'&&afastamento==='Sim')status='Afastado'; if(status==='Encerrada'&&afastamento==='Sim'&&!dataRetorno)return alert('Informe a data de retorno/encerramento ou mantenha o status como Afastado.'); db.ocorrenciasSaude.push({id:Date.now(),data:ocData.value,cooperadoId:ocCoop.value,tipo:ocTipo.value,afastamento,status,dataRetorno,obs:ocObs.value}); salvarDB(); renderSaude();}
function listarOcorrenciasSaude(){let mes=saudeMes.value,ano=saudeAno.value,lista=db.ocorrenciasSaude.filter(o=>mesmoMesAno(o.data,mes,ano)); let ocorrencias=lista.length,cooperadosAfastados=new Set(db.ocorrenciasSaude.filter(o=>temAfastamentoAtivo(o)).map(o=>String(o.cooperadoId))).size,diasPerdidos=(db.ocorrenciasSaude||[]).reduce((a,o)=>a+diasPerdidosNoPeriodo(o,mes,ano),0),semAcidente=diasSemAcidente(); saudeLista.innerHTML=`<div class="dashboard-cards"><div class="card"><div>Ocorrências do mês</div><div class="card-value">${ocorrencias}</div></div><div class="card"><div>Cooperados afastados</div><div class="card-value">${cooperadosAfastados}</div><small>situação atual</small></div><div class="card"><div>Dias perdidos</div><div class="card-value">${diasPerdidos}</div><small>somatório do período</small></div><div class="card"><div>Dias sem acidente</div><div class="card-value">${semAcidente===null?'-':semAcidente}</div></div></div><div class="table-wrap"><table><tr><th>Data</th><th>Cooperado</th><th>Tipo</th><th>Afastamento</th><th>Status</th><th>Retorno</th><th>Dias perdidos</th><th>Obs.</th><th>Ações</th></tr>${lista.map(o=>{let c=db.cooperados.find(x=>String(x.id)===String(o.cooperadoId));let st=statusOcorrencia(o);let acoes=st==='Encerrada'?`<button class="mini-btn warning" onclick="reabrirOcorrenciaSaude(${o.id})">↩️ Reabrir</button>`:`<button class="mini-btn warning" onclick="encerrarOcorrenciaSaude(${o.id})">✅ Encerrar</button>`;return `<tr><td>${formatarDataBR(o.data)}</td><td>${escapeHtml(c?.nome||'')}</td><td>${escapeHtml(o.tipo)}</td><td>${escapeHtml(o.afastamento)}</td><td>${chipStatusOcorrencia(st)}</td><td>${st==='Encerrada'&&o.dataRetorno?formatarDataBR(o.dataRetorno):'-'}</td><td>${diasAfastamentoOcorrencia(o)}</td><td>${escapeHtml(o.obs||'')}</td><td><div class="quick-actions">${acoes}<button class="mini-btn danger" onclick="excluirOcorrenciaSaude(${o.id})">🗑️ Excluir</button></div></td></tr>`}).join('')||'<tr><td colspan="9">Sem ocorrências no período.</td></tr>'}</table></div>`;}
function encerrarOcorrenciaSaude(id){let o=db.ocorrenciasSaude.find(x=>x.id===id); if(!o)return; let data=prompt('Informe a data de retorno/encerramento (AAAA-MM-DD):',hojeISO()); if(!data)return; o.status='Encerrada'; o.dataRetorno=data; salvarDB(); listarOcorrenciasSaude();}
function reabrirOcorrenciaSaude(id){let o=db.ocorrenciasSaude.find(x=>x.id===id); if(!o)return; o.status=String(o.afastamento)==='Sim'?'Afastado':'Aberta'; o.dataRetorno=''; salvarDB(); listarOcorrenciasSaude();}

 ocAfastamento.onchange=()=>{if(ocAfastamento.value==='Sim'){ocStatus.value='Afastado';ocRetorno.value=''}else{ocStatus.value='Encerrada';ocRetorno.value=ocData.value}}; salvarOcorrencia.onclick=salvarOcorrenciaSaude; cancelarOcorrencia.onclick=()=>{editOcorrenciaId=null;renderSaude()}; btnSaude.onclick=listarOcorrenciasSaude; if(editOcorrenciaId)popularFormOcorrenciaSaude(editOcorrenciaId); listarOcorrenciasSaude();}

function popularFormOcorrenciaSaude(id){let o=db.ocorrenciasSaude.find(x=>x.id===id); if(!o)return; ocData.value=o.data||hojeISO(); ocCoop.value=o.cooperadoId||''; ocTipo.value=o.tipo||'Corte'; ocAfastamento.value=o.afastamento||'Não'; ocStatus.value=statusOcorrencia(o); ocRetorno.value=o.dataRetorno||''; ocObs.value=o.obs||'';}
function editarOcorrenciaSaude(id){editOcorrenciaId=id; renderSaude();}
function listarOcorrenciasSaude(){let mes=saudeMes.value,ano=saudeAno.value,lista=db.ocorrenciasSaude.filter(o=>mesmoMesAno(o.data,mes,ano)); let ocorrencias=lista.length,cooperadosAfastados=new Set(db.ocorrenciasSaude.filter(o=>temAfastamentoAtivo(o)).map(o=>String(o.cooperadoId))).size,diasPerdidos=(db.ocorrenciasSaude||[]).reduce((a,o)=>a+diasPerdidosNoPeriodo(o,mes,ano),0),semAcidente=diasSemAcidente(); saudeLista.innerHTML=`<div class="dashboard-cards"><div class="card"><div>Ocorrências do mês</div><div class="card-value">${ocorrencias}</div></div><div class="card"><div>Cooperados afastados</div><div class="card-value">${cooperadosAfastados}</div><small>situação atual</small></div><div class="card"><div>Dias perdidos</div><div class="card-value">${diasPerdidos}</div><small>somatório do período</small></div><div class="card"><div>Dias sem acidente</div><div class="card-value">${semAcidente===null?'-':semAcidente}</div></div></div><div class="table-wrap"><table><tr><th>Data</th><th>Cooperado</th><th>Tipo</th><th>Afastamento</th><th>Status</th><th>Retorno</th><th>Dias perdidos</th><th>Obs.</th><th>Ações</th></tr>${lista.map(o=>{let c=db.cooperados.find(x=>String(x.id)===String(o.cooperadoId));let st=statusOcorrencia(o);let acoes=st==='Encerrada'?`<button class="mini-btn warning" onclick="reabrirOcorrenciaSaude(${o.id})">↩️ Reabrir</button>`:`<button class="mini-btn warning" onclick="encerrarOcorrenciaSaude(${o.id})">✅ Encerrar</button>`;return `<tr><td>${formatarDataBR(o.data)}</td><td>${escapeHtml(c?.nome||'')}</td><td>${escapeHtml(o.tipo)}</td><td>${escapeHtml(o.afastamento)}</td><td>${chipStatusOcorrencia(st)}</td><td>${st==='Encerrada'&&o.dataRetorno?formatarDataBR(o.dataRetorno):'-'}</td><td>${diasAfastamentoOcorrencia(o)}</td><td>${escapeHtml(o.obs||'')}</td><td><div class="quick-actions"><button class="mini-btn info" onclick="editarOcorrenciaSaude(${o.id})">✏️ Editar</button>${acoes}<button class="mini-btn danger" onclick="excluirOcorrenciaSaude(${o.id})">🗑️ Excluir</button></div></td></tr>`}).join('')||'<tr><td colspan="9">Sem ocorrências no período.</td></tr>'}</table></div>`;}
function excluirOcorrenciaSaude(id){if(confirm('Excluir ocorrência? Use apenas em caso de lançamento errado. O ideal é encerrar, não excluir.')){db.ocorrenciasSaude=db.ocorrenciasSaude.filter(o=>o.id!==id); if(editOcorrenciaId===id)editOcorrenciaId=null; salvarDB();listarOcorrenciasSaude();}}

function renderBackup(){dynamicView().innerHTML=`<div class="card-panel"><h2>💾 Backup e Restauração</h2><div class="notice"><strong>Modo seguro de campo:</strong> este módulo foi simplificado para evitar perda acidental de dados. Foram removidos os botões de exemplo e limpeza. Os lançamentos ficam marcados como backup pendente e, ao fechar a página, o sistema solicitará um único backup com todas as alterações realizadas.</div><div class="dashboard-cards"><div class="card"><div>Último backup</div><div class="card-value" style="font-size:1.05rem">${localStorage.getItem('recControlUltimoBackup')?new Date(localStorage.getItem('recControlUltimoBackup')).toLocaleString('pt-BR'):'Nunca realizado'}</div></div><div class="card"><div>Backup pendente</div><div class="card-value">${localStorage.getItem('recControlBackupPendente')==='sim'?'SIM':'NÃO'}</div></div><div class="card"><div>Alterações desde backup</div><div class="card-value">${localStorage.getItem('recControlAlteracoesDesdeBackup')||0}</div></div></div><div class="btn-row"><button id="exportarJSON">📥 Fazer Backup Manual</button><input type="file" id="importarArquivo" accept=".json"><button id="importarBtn" class="info">📂 Importar Backup</button></div></div>`; exportarJSON.onclick=()=>baixarBackup('manual'); importarBtn.onclick=()=>{let f=importarArquivo.files[0];if(!f)return alert('Selecione um arquivo JSON.');let r=new FileReader();r.onload=e=>{try{let pacote=JSON.parse(e.target.result);db=pacote.dados||pacote;backupEmAndamento=true;salvarDB();backupEmAndamento=false;alert('Backup restaurado.');renderAtual();atualizarBackupStatusTopo()}catch(err){alert('Arquivo inválido.')}};r.readAsText(f)};}

document.querySelectorAll('#main-menu button').forEach(btn=>btn.addEventListener('click',()=>{currentView=btn.dataset.view;editProducaoId=editVendaId=editDespesaId=editCoopId=null;editMaterialNome=null;renderAtual();rolarConteudoParaTopo();})); const rodapeObserver=new MutationObserver(()=>adicionarRodapeInstitucional()); rodapeObserver.observe(document.getElementById('dynamic-view'),{childList:true}); carregarDB(); renderAtual(); appReady=true; atualizarBackupStatusTopo(); avisoAberturaBackup(); document.getElementById('backupRapidoTopo')?.addEventListener('click',()=>baixarBackup('manual_topo'));
